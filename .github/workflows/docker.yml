name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t miguelr87/api_github:${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag miguelr87/api_github:${{ github.sha }} miguelr87/api_github:latest
          docker tag miguelr87/api_github:${{ github.sha }} miguelr87/api_github:1.1

      - name: Push Docker image
        run: |
          docker push miguelr87/api_github:latest
          docker push miguelr87/api_github:1.1
