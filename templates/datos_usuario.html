{% extends "base.html" %} {% block title %}Perfil del Usuario{% endblock %} {%
block content %}
<div class="container mt-4">
  <h2 class="mb-4">Perfil del Usuario</h2>

  <div id="error-container" class="alert alert-danger d-none"></div>

  <div id="user-profile" class="card shadow-sm p-3 d-none">
    <div class="d-flex align-items-center">
      <img
        id="avatar"
        class="rounded-circle border shadow-sm me-3"
        width="80"
        height="80"
      />
      <div>
        <h4 id="login" class="fw-bold mb-1"></h4>
        <a id="profile-link" href="#" target="_blank" class="text-muted"
          >Ver en GitHub</a
        >
      </div>
    </div>
    <p id="bio" class="mt-3"></p>
    <p><strong>Empresa:</strong> <span id="company"></span></p>
    <p><strong>Ubicación:</strong> <span id="location"></span></p>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const errorContainer = document.getElementById("error-container");
    const profileCard = document.getElementById("user-profile");

    try {
      // Token inyectado desde la sesión Flask
      const token = "{{ session['token'] if session['token'] else '' }}";

      const response = await fetch(`/api/datosUsuario`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error);

      document.getElementById("avatar").src = data.avatar_url;
      document.getElementById("login").textContent = data.login;
      document.getElementById("profile-link").href = data.html_url;
      document.getElementById("bio").textContent = data.bio || "";
      document.getElementById("company").textContent = data.company || "";
      document.getElementById("location").textContent = data.location || "";

      profileCard.classList.remove("d-none");
    } catch (err) {
      errorContainer.textContent = "Error: " + err.message;
      errorContainer.classList.remove("d-none");
    }
  });
</script>
{% endblock %}
